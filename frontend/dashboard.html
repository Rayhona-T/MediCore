<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CareTrack Clinic MRMS Dashboard">
  <title>Dashboard | CareTrack Clinic MRMS</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar no-print" aria-label="Main navigation">
      <div class="sidebar-brand">
        <h2>CareTrack Clinic</h2>
        <span>Medical Records</span>
      </div>
      <nav class="sidebar-nav">
        <ul>
          <li data-nav="dashboard"><a href="dashboard.html" data-page="dashboard"><span class="nav-icon">&#9632;</span> Dashboard</a></li>
          <li data-nav="doctors"><a href="doctors.html" data-page="doctors"><span class="nav-icon">&#9877;</span> Doctors</a></li>
          <li data-nav="patients"><a href="patients.html" data-page="patients"><span class="nav-icon">&#9829;</span> Patients</a></li>
          <li data-nav="diagnoses"><a href="diagnoses.html" data-page="diagnoses"><span class="nav-icon">&#9888;</span> Diagnoses</a></li>
          <li data-nav="reports"><a href="reports.html" data-page="reports"><span class="nav-icon">&#128196;</span> Reports</a></li>
        </ul>
      </nav>
      <div class="sidebar-footer">
        <div id="sidebar-user" class="user-info"></div>
        <button type="button" id="logout-btn" class="btn btn-secondary btn-sm" style="width: 100%;">Logout</button>
      </div>
    </aside>

    <div id="sidebar-backdrop" class="sidebar-backdrop"></div>

    <div class="main-content">
      <header class="page-header no-print">
        <div style="display: flex; align-items: center; gap: 1rem;">
          <button type="button" id="menu-toggle" class="menu-toggle" aria-label="Open menu">&#9776;</button>
          <h1>Dashboard</h1>
        </div>
      </header>

      <div class="page-body">
        <section class="stats-grid" aria-label="Statistics overview">
          <article class="stat-card">
            <div class="stat-card-icon doctors" aria-hidden="true">&#9877;</div>
            <div>
              <div id="stat-doctors" class="stat-card-value">0</div>
              <div class="stat-card-label">Total Doctors</div>
            </div>
          </article>
          <article class="stat-card">
            <div class="stat-card-icon patients" aria-hidden="true">&#9829;</div>
            <div>
              <div id="stat-patients" class="stat-card-value">0</div>
              <div class="stat-card-label">Total Patients</div>
            </div>
          </article>
          <article class="stat-card">
            <div class="stat-card-icon diagnoses" aria-hidden="true">&#9888;</div>
            <div>
              <div id="stat-diagnoses" class="stat-card-value">0</div>
              <div class="stat-card-label">Total Diagnoses</div>
            </div>
          </article>
        </section>

        <section class="content-card">
          <div class="content-card-header">
            <h2>Recent Activity</h2>
          </div>
          <div class="content-card-body">
            <ul id="activity-list" class="activity-list" aria-live="polite">
              <li class="text-muted">Loading activity...</li>
            </ul>
          </div>
        </section>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
