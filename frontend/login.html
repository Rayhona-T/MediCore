<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CareTrack Clinic - Medical Record Management System Login">
  <title>Login | CareTrack Clinic MRMS</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="login-page">
    <section class="login-card" aria-labelledby="login-heading">
      <header class="login-brand">
        <div class="logo-icon" aria-hidden="true">CT</div>
        <h1 id="login-heading">CareTrack Clinic</h1>
        <p>Medical Record Management System</p>
      </header>

      <div id="login-error" class="alert alert-error hidden" role="alert"></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="username">Username <span class="required">*</span></label>
          <input type="text" id="username" name="username" class="form-control" required autocomplete="username" placeholder="Enter username">
          <span class="invalid-feedback">Username is required.</span>
        </div>

        <div class="form-group">
          <label for="password">Password <span class="required">*</span></label>
          <input type="password" id="password" name="password" class="form-control" required autocomplete="current-password" placeholder="Enter password">
          <span class="invalid-feedback">Password is required.</span>
        </div>

        <div class="form-group">
          <label for="role">Role <span class="required">*</span></label>
          <select id="role" name="role" class="form-control" required>
            <option value="">Select your role</option>
            <option value="administrator">Administrator</option>
            <option value="clinician">Clinician</option>
            <option value="receptionist">Receptionist</option>
          </select>
          <span class="invalid-feedback">Please select a role.</span>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">Sign In</button>
      </form>
      <p class="text-center" style="margin-top: 1rem; color: var(--color-text-muted);">
        Don't have an account? <a href="signup.html">Sign Up</a>
      </p>
      <p class="text-center" style="margin-top: 0.5rem; color: var(--color-text-muted);">
        <a href="index.html">Back to Home</a>
      </p>
    </section>
  </main>

  <script src="js/auth.js"></script>
</body>
</html>
